<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV Messages</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F9F9F9;
            --accent: #007AFF;
            --accent-light: #409CFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --separator: #E5E5EA;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.5);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            --transition-fast: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-smooth: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1C1C1E;
                --bg-tertiary: #2C2C2E;
                --text-primary: #FFFFFF;
                --text-secondary: #8E8E93;
                --text-tertiary: #48484A;
                --separator: #38383A;
                --glass-bg: rgba(28, 28, 30, 0.82);
                --glass-border: rgba(255, 255, 255, 0.08);
                --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
        }

        .av-container {
            display: flex;
            gap: 4px;
            align-items: center;
            animation: splashFloat 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes splashFloat {
            0% { 
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            40% {
                opacity: 1;
                transform: scale(1.02) translateY(-4px);
            }
            70% {
                transform: scale(0.98) translateY(2px);
            }
            85% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-10px);
            }
        }

        .av-letter {
            font-family: var(--font-stack);
            font-weight: 700;
            font-size: clamp(80px, 20vw, 160px);
            background: linear-gradient(135deg, #007AFF, #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            filter: drop-shadow(0 2px 8px rgba(0, 122, 255, 0.2));
        }

        /* Banned Screen */
        .banned-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px;
            z-index: 2000;
            text-align: center;
        }

        .banned-screen.visible {
            display: flex;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .banned-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 59, 48, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .banned-icon svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: #FF3B30;
            stroke-width: 2;
        }

        .banned-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .banned-message {
            font-size: 17px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 280px;
        }

        .banned-time {
            font-size: 15px;
            font-weight: 500;
            color: #FF3B30;
            margin-bottom: 40px;
            padding: 12px 24px;
            background: rgba(255, 59, 48, 0.08);
            border-radius: 20px;
        }

        .banned-button {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 14px 40px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            width: 100%;
            max-width: 280px;
            font-family: var(--font-stack);
            box-shadow: var(--shadow-md);
        }

        .banned-button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .banned-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 15px;
            margin-top: 24px;
            font-weight: 500;
            cursor: pointer;
        }

        .banned-link:active {
            opacity: 0.6;
        }

        /* Night Screen */
        .night-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f1421 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 3000;
            overflow: hidden;
        }

        .night-screen.visible {
            display: flex;
        }

        .night-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .night-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2.5s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .night-shooting-star {
            position: absolute;
            width: 80px;
            height: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,0.6), transparent);
            transform: rotate(-35deg);
            animation: shoot 3.5s infinite linear;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-35deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-35deg); opacity: 0; }
        }

        .night-moon {
            position: absolute;
            top: 60px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: #f5f5f5;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.25), 0 0 120px rgba(255, 255, 255, 0.1);
        }

        .night-moon::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 12px;
            width: 16px;
            height: 16px;
            background: #e8e8e8;
            border-radius: 50%;
            opacity: 0.5;
        }

        .night-moon::after {
            content: '';
            position: absolute;
            top: 30px;
            left: 18px;
            width: 8px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 50%;
            opacity: 0.3;
        }

        .night-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 100px;
            filter: blur(30px);
        }

        .night-cloud1 {
            width: 200px;
            height: 60px;
            bottom: 120px;
            left: -30px;
            animation: drift 25s infinite linear;
        }

        .night-cloud2 {
            width: 280px;
            height: 80px;
            top: 200px;
            right: -60px;
            animation: drift 30s infinite linear reverse;
        }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(150px); }
        }

        .night-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .night-closed {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
        }

        .night-message {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 36px;
            text-align: center;
            line-height: 1.5;
        }

        .night-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 14px 36px;
            color: white;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-stack);
            width: 100%;
            max-width: 240px;
        }

        .night-button:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }

        /* TOS Screen */
        .tos-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px;
            z-index: 1001;
            text-align: center;
        }

        .tos-warning.visible {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .tos-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tos-icon svg {
            width: 48px;
            height: 48px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.5;
        }

        .tos-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .tos-message {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.6;
            max-width: 300px;
        }

        .tos-message a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .tos-button {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 14px 40px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            width: 100%;
            max-width: 280px;
            font-family: var(--font-stack);
            box-shadow: var(--shadow-md);
        }

        .tos-button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* Main App */
        .app {
            height: 100vh;
            display: none;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            opacity: 0;
            background: var(--bg-primary);
            position: relative;
        }

        .app.visible {
            display: flex;
            opacity: 1;
        }

        /* Navigation */
        .nav-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--separator);
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 2px;
            gap: 2px;
        }

        .nav-tab {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-family: var(--font-stack);
            position: relative;
        }

        .nav-tab.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .content::-webkit-scrollbar {
            width: 3px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 3px;
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Message Card - Apple iMessage style */
        .message-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: cardAppear 0.4s ease-out both;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .message-id {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.2px;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .message-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.1px;
        }

        .status-answered {
            background: rgba(52, 199, 89, 0.1);
            color: #34C759;
        }

        .status-waiting {
            background: rgba(255, 149, 0, 0.1);
            color: #FF9500;
        }

        .message-text {
            font-size: 16px;
            margin-bottom: 12px;
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            letter-spacing: -0.2px;
        }

        .answer-badge {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-top: 8px;
        }

        .answer-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .answer-text {
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.4;
        }

        .answer-meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Input Area */
        .message-input-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--separator);
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .message-input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .message-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            font-family: var(--font-stack);
            letter-spacing: -0.2px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            line-height: 1.4;
        }

        .message-input:focus {
            outline: none;
            background: var(--bg-secondary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .char-counter {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: var(--text-tertiary);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.2s ease;
            font-family: var(--font-stack);
            letter-spacing: -0.2px;
        }

        .send-btn.active {
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .send-btn.active:active {
            transform: scale(0.97);
            background: #0066D6;
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            margin: 0 auto 12px;
            border: 2.5px solid var(--text-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .empty-state p {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 240px;
            margin: 0 auto;
            line-height: 1.4;
        }

        .hidden {
            display: none !important;
        }

        .script-required {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splash">
        <div class="av-container">
            <span class="av-letter">A</span>
            <span class="av-letter">V</span>
        </div>
    </div>

    <!-- Banned Screen -->
    <div class="banned-screen" id="bannedScreen">
        <div class="banned-icon">
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="11"/>
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="banned-title">Аккаунт заблокирован</div>
        <div class="banned-message">Доступ к приложению ограничен</div>
        <div class="banned-time" id="banTime">1 день</div>
        <button class="banned-button" id="closeBannedBtn">Закрыть</button>
        <a class="banned-link" id="rulesLink">Правила использования</a>
    </div>

    <!-- Night Screen -->
    <div class="night-screen" id="nightScreen">
        <div class="night-stars" id="nightStars"></div>
        <div class="night-shooting-star" style="top: 15%; left: 75%; animation-delay: 1s;"></div>
        <div class="night-shooting-star" style="top: 35%; left: 85%; animation-delay: 3.5s;"></div>
        <div class="night-shooting-star" style="top: 55%; left: 65%; animation-delay: 6s;"></div>
        <div class="night-moon"></div>
        <div class="night-cloud night-cloud1"></div>
        <div class="night-cloud night-cloud2"></div>
        <div class="night-content">
            <div class="night-closed">Закрыто</div>
            <div class="night-message" id="nightMessage">Работа приостановлена</div>
            <button class="night-button" id="closeNightBtn">Закрыть</button>
        </div>
    </div>

    <!-- TOS Screen -->
    <div class="tos-warning" id="tosWarning">
        <div class="tos-icon">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2L3 7v6c0 4.5 9 7.5 9 7.5s9-3 9-7.5V7l-9-5z" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="2.5"/>
                <path d="M12 8v2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="tos-title">Условия использования</div>
        <div class="tos-message">
            Примите условия для продолжения<br><br>
            <a href="https://telegra.ph/Privacy-Policy-for-AV-Messages-Bot-02-26" target="_blank">Конфиденциальность</a> и 
            <a href="https://telegra.ph/Terms-of-Service-for-message-to-av-Bot-02-26" target="_blank">Правила</a>
        </div>
        <button class="tos-button" id="closeAppBtn">Закрыть</button>
    </div>

    <!-- Main App -->
    <div class="app" id="app">
        <div class="script-required">
            <span id="userName"></span>
            <span id="unansweredBadge" class="hidden">0</span>
        </div>

        <nav class="nav-bar">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="inbox">Входящие</button>
                <button class="nav-tab" data-tab="sent">Отправленные</button>
            </div>
        </nav>

        <main class="content">
            <div class="tab active" id="inbox-tab">
                <div class="messages-list" id="inboxMessages">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Загрузка...
                    </div>
                </div>
            </div>
            <div class="tab" id="sent-tab">
                <div class="messages-list" id="sentMessages">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Загрузка...
                    </div>
                </div>
            </div>
        </main>

        <div class="message-input-container" id="messageInputContainer">
            <div class="message-input-wrapper">
                <textarea 
                    class="message-input" 
                    id="messageText" 
                    placeholder="Сообщение..."
                    rows="3"
                    maxlength="4096"
                ></textarea>
                <span class="char-counter" id="charCounter">0/4096</span>
            </div>
            <button class="send-btn" id="sendMessageBtn" disabled>
                Отправить
            </button>
        </div>
    </div>

    <script>
        (function() {
            let animationFinished = false;
            let authFinished = false;
            let authResult = null;
            let bannedInfo = null;

            const tg = window.Telegram.WebApp;
            const splash = document.getElementById('splash');
            const tosWarning = document.getElementById('tosWarning');
            const app = document.getElementById('app');
            const bannedScreen = document.getElementById('bannedScreen');
            const nightScreen = document.getElementById('nightScreen');

            tg.expand();
            tg.setHeaderColor('#F2F2F7');
            tg.setBackgroundColor('#F2F2F7');

            tosWarning.classList.remove('visible');
            app.classList.remove('visible');
            bannedScreen.classList.remove('visible');
            nightScreen.classList.remove('visible');

            function getDaysText(days) {
                if (days === 1) return '1 день';
                if (days >= 2 && days <= 4) return days + ' дня';
                return days + ' дней';
            }

            function showBannedScreen(banInfo) {
                bannedInfo = banInfo;
                if (banInfo.until) {
                    const now = new Date();
                    const until = new Date(banInfo.until);
                    const diffMs = until - now;
                    if (diffMs > 0) {
                        const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                        document.getElementById('banTime').textContent = getDaysText(days);
                    } else {
                        document.getElementById('banTime').textContent = 'Навсегда';
                    }
                } else {
                    document.getElementById('banTime').textContent = 'Навсегда';
                }
                splash.style.display = 'none';
                tosWarning.classList.remove('visible');
                app.classList.remove('visible');
                nightScreen.classList.remove('visible');
                bannedScreen.classList.add('visible');
            }

            function showNightScreen(message) {
                document.getElementById('nightMessage').textContent = message || 'Работа приостановлена';
                splash.style.display = 'none';
                tosWarning.classList.remove('visible');
                app.classList.remove('visible');
                bannedScreen.classList.remove('visible');
                nightScreen.classList.add('visible');
            }

            function createNightStars() {
                const starsContainer = document.getElementById('nightStars');
                for (let i = 0; i < 120; i++) {
                    const star = document.createElement('div');
                    star.className = 'night-star';
                    const size = Math.random() * 2.5 + 1;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 3 + 's';
                    starsContainer.appendChild(star);
                }
            }

            function startAnimation() {
                const avContainer = document.querySelector('.av-container');
                avContainer.addEventListener('animationend', function(e) {
                    if (e.animationName === 'splashFloat') {
                        animationFinished = true;
                        tryShowScreen();
                    }
                });
            }

            async function runAuth() {
                try {
                    authResult = await authenticate(tg.initData);
                } catch (error) {
                    authResult = { ok: false, error: error.message };
                } finally {
                    authFinished = true;
                    tryShowScreen();
                }
            }

            function tryShowScreen() {
                if (!animationFinished || !authFinished) return;

                if (authResult && !authResult.ok && authResult.error === 'night_mode') {
                    showNightScreen(authResult.message);
                    return;
                }

                if (authResult && !authResult.ok && authResult.error === 'banned' && authResult.ban_info) {
                    showBannedScreen(authResult.ban_info);
                    return;
                }

                splash.style.display = 'none';

                if (authResult && authResult.ok && authResult.user && authResult.user.accepted_tos === true) {
                    window.userData = authResult.user;
                    window.tg = tg;
                    document.getElementById('userName').textContent = authResult.user.first_name || 'User';
                    if (authResult.user.unanswered > 0) {
                        document.getElementById('unansweredBadge').textContent = authResult.user.unanswered;
                        document.getElementById('unansweredBadge').classList.remove('hidden');
                    }
                    app.classList.add('visible');
                    Promise.all([
                        loadInboxMessages(tg.initData).catch(() => []),
                        loadSentMessages(tg.initData).catch(() => [])
                    ]).then(() => {
                        setupTabs();
                        setupEventListeners();
                    });
                } else {
                    tosWarning.classList.add('visible');
                }
            }

            async function authenticate(initData) {
                if (!initData) return { ok: false, error: 'Нет данных авторизации' };
                try {
                    const response = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ initData })
                    });
                    if (response.status === 503) {
                        const errorData = await response.json();
                        return { ok: false, ...errorData };
                    }
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        return { ok: false, ...errorData, status: response.status };
                    }
                    return await response.json();
                } catch (error) {
                    return { ok: false, error: error.message };
                }
            }

            async function loadInboxMessages(initData) {
                try {
                    const response = await fetch('/api/messages/inbox', {
                        headers: { 'X-Telegram-Init-Data': initData }
                    });
                    if (response.status === 503) {
                        const errorData = await response.json();
                        if (errorData.error === 'night_mode') {
                            showNightScreen(errorData.message);
                            return;
                        }
                    }
                    if (response.status === 403) {
                        const errorData = await response.json();
                        if (errorData.error === 'banned' && errorData.ban_info) {
                            showBannedScreen(errorData.ban_info);
                            return;
                        }
                    }
                    if (!response.ok) {
                        displayInboxMessages([]);
                        return;
                    }
                    const data = await response.json();
                    displayInboxMessages(data.messages || []);
                } catch (error) {
                    displayInboxMessages([]);
                }
            }

            async function loadSentMessages(initData) {
                try {
                    const response = await fetch('/api/messages/sent', {
                        headers: { 'X-Telegram-Init-Data': initData }
                    });
                    if (response.status === 503) {
                        const errorData = await response.json();
                        if (errorData.error === 'night_mode') {
                            showNightScreen(errorData.message);
                            return;
                        }
                    }
                    if (response.status === 403) {
                        const errorData = await response.json();
                        if (errorData.error === 'banned' && errorData.ban_info) {
                            showBannedScreen(errorData.ban_info);
                            return;
                        }
                    }
                    if (!response.ok) {
                        displaySentMessages([]);
                        return;
                    }
                    const data = await response.json();
                    displaySentMessages(data.messages || []);
                } catch (error) {
                    displaySentMessages([]);
                }
            }

            async function sendMessage() {
                const textarea = document.getElementById('messageText');
                const sendBtn = document.getElementById('sendMessageBtn');
                const text = textarea.value.trim();
                if (!text || sendBtn.disabled) return;
                sendBtn.disabled = true;
                sendBtn.classList.remove('active');
                try {
                    const response = await fetch('/api/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ initData: window.tg.initData, text: text })
                    });
                    if (response.status === 503) {
                        const errorData = await response.json();
                        if (errorData.error === 'night_mode') {
                            showNightScreen(errorData.message);
                            return;
                        }
                    }
                    const result = await response.json();
                    if (!response.ok) {
                        if (result.error === 'banned' && result.ban_info) {
                            showBannedScreen(result.ban_info);
                            return;
                        }
                        alert(result.message || 'Ошибка');
                        return;
                    }
                    if (result.ok) {
                        textarea.value = '';
                        document.getElementById('charCounter').textContent = '0/4096';
                        await Promise.all([
                            loadInboxMessages(window.tg.initData),
                            loadSentMessages(window.tg.initData)
                        ]);
                        if (window.tg.showPopup) {
                            window.tg.showPopup({
                                title: 'Отправлено',
                                message: `Сообщение #${result.message_id}`,
                                buttons: [{ type: 'ok' }]
                            });
                        }
                    }
                } catch (error) {
                    alert('Ошибка отправки');
                } finally {
                    const hasText = textarea.value.trim().length > 0;
                    sendBtn.disabled = !hasText;
                    if (hasText) sendBtn.classList.add('active');
                }
            }

            function displayInboxMessages(messages) {
                const container = document.getElementById('inboxMessages');
                if (!container) return;
                if (!messages || messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">✉️</div>
                            <h3>Нет ответов</h3>
                            <p>Здесь появятся ответы администратора</p>
                        </div>`;
                    return;
                }
                let html = '';
                messages.forEach(msg => {
                    const date = msg.answered_at ? new Date(msg.answered_at) : new Date();
                    const timeStr = date.toLocaleString('ru-RU', {
                        hour: '2-digit',
                        minute: '2-digit',
                        day: '2-digit',
                        month: '2-digit'
                    });
                    html += `
                        <div class="message-card">
                            <div class="message-header">
                                <span class="message-id">#${msg.message_id}</span>
                                <span class="message-time">${timeStr}</span>
                            </div>
                            <div class="answer-badge">
                                <div class="answer-header">Ответ</div>
                                <div class="answer-text">${escapeHtml(msg.answer_text || '')}</div>
                                <div class="answer-meta">${msg.answered_by_name || 'Администратор'}</div>
                            </div>
                            <div style="margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--separator);">
                                <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">Ваше сообщение</div>
                                <div style="font-size: 15px; color: var(--text-primary);">${escapeHtml(msg.original_text || '')}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            }

            function displaySentMessages(messages) {
                const container = document.getElementById('sentMessages');
                if (!container) return;
                if (!messages || messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">💬</div>
                            <h3>Нет сообщений</h3>
                            <p>Напишите первое сообщение</p>
                        </div>`;
                    return;
                }
                let html = '';
                messages.forEach(msg => {
                    const date = msg.forwarded_at ? new Date(msg.forwarded_at) : new Date();
                    const timeStr = date.toLocaleString('ru-RU', {
                        hour: '2-digit',
                        minute: '2-digit',
                        day: '2-digit',
                        month: '2-digit'
                    });
                    const statusClass = msg.is_answered ? 'status-answered' : 'status-waiting';
                    const statusText = msg.is_answered ? '✓ Отвечено' : '• Ожидает';
                    html += `
                        <div class="message-card">
                            <div class="message-header">
                                <span class="message-id">#${msg.message_id}</span>
                                <span class="message-time">${timeStr}</span>
                            </div>
                            <div class="message-status ${statusClass}">${statusText}</div>
                            <div class="message-text">${escapeHtml(msg.text || '')}</div>
                            ${msg.is_answered ? `
                                <div class="answer-badge">
                                    <div class="answer-header">Ответ</div>
                                    <div class="answer-text">${escapeHtml(msg.answer_text || '')}</div>
                                </div>` : ''}
                        </div>`;
                });
                container.innerHTML = html;
            }

            function setupTabs() {
                const tabButtons = document.querySelectorAll('.nav-tab');
                const tabs = document.querySelectorAll('.tab');
                tabButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const tabId = this.dataset.tab;
                        tabButtons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        tabs.forEach(t => t.classList.remove('active'));
                        document.getElementById(tabId + '-tab').classList.add('active');
                    });
                });
            }

            function setupEventListeners() {
                const textarea = document.getElementById('messageText');
                const sendBtn = document.getElementById('sendMessageBtn');
                if (textarea) {
                    textarea.addEventListener('input', () => {
                        const length = textarea.value.length;
                        document.getElementById('charCounter').textContent = length + '/4096';
                        const hasText = textarea.value.trim().length > 0;
                        sendBtn.disabled = !hasText;
                        if (hasText) sendBtn.classList.add('active');
                        else sendBtn.classList.remove('active');
                    });
                }
                if (sendBtn) sendBtn.addEventListener('click', sendMessage);
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            document.getElementById('closeBannedBtn').addEventListener('click', () => tg?.close() || window.close());
            document.getElementById('closeNightBtn').addEventListener('click', () => tg?.close() || window.close());
            document.getElementById('closeAppBtn').addEventListener('click', () => tg?.close() || window.close());
            document.getElementById('rulesLink').addEventListener('click', (e) => {
                e.preventDefault();
                if (tg?.openLink) tg.openLink('https://telegra.ph/Terms-of-Service-for-message-to-av-Bot-02-26');
                else window.open('https://telegra.ph/Terms-of-Service-for-message-to-av-Bot-02-26', '_blank');
            });

            createNightStars();
            startAnimation();
            runAuth();
        })();
    </script>
</body>
</html>
